<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lo-Fi Beat Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-icon">&#9834;</span>
        <h1>Lo-Fi Beat Generator</h1>
      </div>
      <p class="tagline">AI-generated chill beats — no loops, no samples.</p>
    </header>

    <main>
      <!-- Visualizer -->
      <div class="visualizer" id="visualizer">
        <div class="bar" style="--i:0"></div>
        <div class="bar" style="--i:1"></div>
        <div class="bar" style="--i:2"></div>
        <div class="bar" style="--i:3"></div>
        <div class="bar" style="--i:4"></div>
        <div class="bar" style="--i:5"></div>
        <div class="bar" style="--i:6"></div>
        <div class="bar" style="--i:7"></div>
        <div class="bar" style="--i:8"></div>
        <div class="bar" style="--i:9"></div>
        <div class="bar" style="--i:10"></div>
        <div class="bar" style="--i:11"></div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button id="generateBtn" class="btn-generate" onclick="generateBeat()">
          <span id="btnText">Generate Beat</span>
          <span id="spinner" class="spinner hidden"></span>
        </button>
      </div>

      <!-- Player -->
      <div class="player hidden" id="player">
        <audio id="audioPlayer" controls></audio>
        <button class="btn-download" id="downloadBtn" onclick="downloadBeat()">
          &#8595; Download WAV
        </button>
      </div>

      <!-- Status -->
      <div id="statusMsg" class="status-msg hidden"></div>
    </main>

    <footer>
      <p>LSTM-powered &middot; MIDI-trained &middot; Lo-Fi only</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
